apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app
        image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/java-app:latest
        ports:
        - containerPort: 8080
